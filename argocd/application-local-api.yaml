apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-api-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<ORG_O_USUARIO>/<REPO>.git
    targetRevision: main
    path: Niveles/4/argo/gitops-api-base/manifests/api
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true